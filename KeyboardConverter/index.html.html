<html>	
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1/jquery.min.js"></script>
<script type="text/javascript">

</script>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
<script type="text/javascript" src="js/functions.js"></script>
<style type="text/css">
	body{
		width: 99%;
		background-color: #ecf0f1;
	}
</style>
</head>
<body>
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<center><h1>AZERTY/QWERTY CONVERTER</h1><u><i>By ShoxX</i></u></center>
		</div>
	</div>

	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<textarea class="form-control" rows="6"id="azerty" type="text" name="azerty" placeholder="Type your text in your azerty keyboard"></textarea>
		</div>
	</div>
	<div class="row">
		<div class="col-md-4 col-md-offset-4">
			<hr/>
		</div>
	</div>
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<textarea class="form-control" rows="6" id="qwerty" type="text" name="qwerty" placeholder="See what you have to type on your qwerty keyboard !"></textarea>
		</div>
	</div>
	<div class="row">
		<div class="col-md-4 col-md-offset-4">
			<hr/>
		</div>
	</div>
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<div class="row">
				<div class="col-md-6">
					<button  type="button" class="btn btn-primary btn-lg btn-block" onclick="check_azerty()">Azerty -> Qwerty</button>
				</div>
				<div class="col-md-6">
					<button   type="button" class="btn btn-primary btn-lg btn-block" onclick="check_qwerty()">Qwerty -> Azerty</button>
				</div>
			</div>
		</div>
	</div>
	<div class="row">
		<div class="col-md-4 col-md-offset-4">
			<hr/>
		</div>
	</div>
	<div class="row">
		<div class="col-md-8 col-md-offset-2">
			<div class="panel panel-default">
			  <div class="panel-heading">
			    <h3 class="panel-title">How To Use It ?</h3>
			  </div>
			  <div class="panel-body">
			    Sometimes, you just want to type your password, but the keyboard is not in the good format.
			    Here you can translate your azerty to qwerty or your qwerty to azerty !
			    Remember : In QWERTY there is no <kbd>é</kbd> <kbd>è</kbd> <kbd>à</kbd> .." this is only for our french language ;)
			  </div>
			</div>
		</div>
	</div>

</body>


</html>
